<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0b0f1a">
<title>CUMBRE — Espagnol A2→C1</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
:root{
  --bg:#0b0f1a; --bg2:#111726; --card:#151d30; --card2:#1b2540;
  --line:#25304d; --txt:#e8edf7; --muted:#8b97b3; --dim:#5b6480;
  --accent:#ffb020; --accent2:#ff8f1f; --good:#2ecc71; --bad:#ff5c6c;
  --blue:#4d8dff; --purple:#9d7bff;
  --r:16px; --sh:0 8px 30px rgba(0,0,0,.35);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  background:radial-gradient(1200px 600px at 50% -200px,#1a2440 0,transparent 60%),var(--bg);
  color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  min-height:100vh;line-height:1.45;-webkit-font-smoothing:antialiased;
  padding-bottom:calc(78px + env(safe-area-inset-bottom));
}
.wrap{max-width:640px;margin:0 auto;padding:16px}
h1,h2,h3{margin:0;font-weight:800;letter-spacing:-.02em}
button{font-family:inherit;cursor:pointer;border:none;color:inherit}
.hidden{display:none!important}

/* Header */
.top{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 4px}
.logo{font-size:30px;font-weight:900;letter-spacing:-.04em;
  background:linear-gradient(120deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent}
.logo small{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.04em;-webkit-text-fill-color:var(--muted);display:block;margin-top:-4px}
.stats{display:flex;gap:8px}
.chip{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:6px 10px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:5px}
.chip .k{color:var(--muted);font-weight:600;font-size:11px}

/* Cards */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:var(--sh);margin-bottom:14px}
.card h2{font-size:18px;margin-bottom:2px}
.sub{color:var(--muted);font-size:13px}

/* Home tiles */
.tile{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  padding:16px;margin-bottom:12px;width:100%;text-align:left;transition:transform .1s,border-color .2s}
.tile:active{transform:scale(.985)}
.tile .ic{width:48px;height:48px;border-radius:13px;display:grid;place-items:center;font-size:24px;flex:0 0 auto}
.tile .body{flex:1;min-width:0}
.tile .t{font-weight:800;font-size:16px}
.tile .d{color:var(--muted);font-size:13px}
.tile .badge{background:var(--accent);color:#241700;font-weight:800;font-size:12px;border-radius:20px;padding:3px 9px;min-width:24px;text-align:center}
.tile .badge.zero{background:var(--card2);color:var(--muted)}
.ic.g{background:linear-gradient(135deg,#4d8dff33,#4d8dff11);color:var(--blue)}
.ic.a{background:linear-gradient(135deg,#ffb02033,#ff8f1f11);color:var(--accent)}
.ic.l{background:linear-gradient(135deg,#9d7bff33,#9d7bff11);color:var(--purple)}
.ic.e{background:linear-gradient(135deg,#2ecc7133,#2ecc7111);color:var(--good)}

/* Progress bar */
.pbar{height:8px;background:var(--bg2);border-radius:20px;overflow:hidden;margin-top:8px}
.pbar > i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:20px;transition:width .5s}
.xpwrap{background:linear-gradient(135deg,var(--card2),var(--card));border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:14px}
.xpwrap .lv{display:flex;align-items:baseline;justify-content:space-between}
.xpwrap .lv b{font-size:22px;font-weight:900}
.xpwrap .lv span{color:var(--muted);font-size:13px}

/* Buttons */
.btn{display:block;width:100%;background:linear-gradient(120deg,var(--accent),var(--accent2));color:#241700;font-weight:800;
  font-size:16px;padding:15px;border-radius:14px;text-align:center;margin-top:6px}
.btn:active{filter:brightness(.95)}
.btn.sec{background:var(--card2);color:var(--txt);border:1px solid var(--line)}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--muted);font-weight:700}
.btn:disabled{opacity:.45}

/* Options (quiz) */
.opt{display:block;width:100%;text-align:left;background:var(--card2);border:1.5px solid var(--line);border-radius:13px;
  padding:14px 15px;margin-bottom:10px;font-size:15px;font-weight:600;transition:.12s;position:relative}
.opt:active{transform:scale(.99)}
.opt .lab{display:inline-grid;place-items:center;width:24px;height:24px;border-radius:7px;background:var(--bg2);
  font-size:12px;font-weight:800;margin-right:10px;color:var(--muted)}
.opt.good{border-color:var(--good);background:#2ecc7118}
.opt.good .lab{background:var(--good);color:#04210f}
.opt.bad{border-color:var(--bad);background:#ff5c6c18}
.opt.bad .lab{background:var(--bad);color:#2a0509}
.opt.dim{opacity:.5}
.opt[disabled]{cursor:default}

.stem{font-size:19px;font-weight:600;line-height:1.5;margin:6px 0 18px}
.stem .blank{color:var(--accent);font-weight:800}
.expl{background:var(--bg2);border-left:3px solid var(--accent);border-radius:0 10px 10px 0;padding:12px 14px;font-size:14px;color:var(--txt);margin-top:4px}
.expl.ok{border-color:var(--good)}
.expl.no{border-color:var(--bad)}

.qmeta{display:flex;justify-content:space-between;align-items:center;color:var(--muted);font-size:13px;font-weight:600;margin-bottom:4px}

/* Flashcard */
.flash{background:linear-gradient(160deg,var(--card2),var(--card));border:1px solid var(--line);border-radius:20px;
  min-height:240px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
  padding:26px;box-shadow:var(--sh);margin-bottom:14px}
.flash .front{font-size:30px;font-weight:800;letter-spacing:-.02em}
.flash .theme{position:relative;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-bottom:14px}
.flash .back{font-size:22px;font-weight:700;color:var(--accent);margin-top:14px}
.flash .ex{font-size:15px;color:var(--muted);font-style:italic;margin-top:12px;max-width:90%}
.flash .gloss{font-size:14px;color:var(--warn,#e0a800);margin-top:14px;max-width:92%;line-height:1.4;
  background:rgba(224,168,0,.08);border:1px solid rgba(224,168,0,.28);border-radius:12px;padding:9px 13px}
.flash .tap{color:var(--dim);font-size:13px;margin-top:18px}
/* Référence des temps */
.tsec{margin-top:18px}
.tsec .th{font-size:12px;font-weight:800;color:var(--accent);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.cleg{font-size:11px;color:var(--dim);margin-bottom:8px}
.cv{display:flex;gap:12px;padding:8px 0;border-bottom:1px solid var(--line);font-size:14px;align-items:baseline}
.cv b{flex:0 0 92px;color:var(--txt)}
.cv span{color:var(--muted);flex:1}
.tirr{font-size:14px;color:var(--muted);line-height:1.7}
.exs{display:flex;flex-direction:column;padding:9px 0;border-bottom:1px solid var(--line)}
.exs:last-child{border-bottom:none}
.exs .es{font-weight:600;color:var(--txt)}
.exs .fr{color:var(--muted);font-size:13px;margin-top:2px}
.srsrow{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.srsrow button{padding:12px 4px;border-radius:12px;font-weight:800;font-size:13px;border:1px solid var(--line);background:var(--card2)}
.srsrow .again{color:var(--bad)} .srsrow .hard{color:var(--accent)} .srsrow .good{color:var(--blue)} .srsrow .easy{color:var(--good)}
.srsrow button small{display:block;font-size:10px;color:var(--muted);font-weight:600;margin-top:2px}

/* Lesson list */
.lrow{display:flex;align-items:center;gap:12px;padding:13px 14px;background:var(--card2);border:1px solid var(--line);
  border-radius:13px;margin-bottom:10px;transition:.12s}
.lrow.locked{opacity:.5}
.lrow:active{transform:scale(.99)}
.lrow .n{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;font-weight:800;background:var(--bg2);flex:0 0 auto}
.lrow.done .n{background:var(--good);color:#04210f}
.lrow .info{flex:1;min-width:0}
.lrow .info .tt{font-weight:700;font-size:15px}
.lrow .info .tg{font-size:12px;color:var(--muted)}
.lrow .sc{font-size:13px;font-weight:800;color:var(--muted)}
.lrow .sc.pass{color:var(--good)}

/* Result screen */
.big{text-align:center;padding:14px 0}
.big .em{font-size:56px}
.big .score{font-size:44px;font-weight:900;margin:6px 0}
.big .lab{color:var(--muted)}

/* Nav */
.nav{position:fixed;bottom:0;left:0;right:0;background:rgba(11,15,26,.9);backdrop-filter:blur(14px);
  border-top:1px solid var(--line);display:flex;padding:8px 6px calc(8px + env(safe-area-inset-bottom));z-index:50}
.nav button{flex:1;background:none;color:var(--muted);font-size:11px;font-weight:700;display:flex;flex-direction:column;
  align-items:center;gap:3px;padding:6px 0;border-radius:12px}
.nav button .ni{font-size:21px;line-height:1}
.nav button.on{color:var(--accent)}

.pill{display:inline-block;font-size:11px;font-weight:800;padding:3px 8px;border-radius:20px;background:var(--bg2);color:var(--muted)}
.pill.warn{background:#ffb02022;color:var(--accent)}
.toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);background:var(--card2);border:1px solid var(--line);
  padding:11px 18px;border-radius:24px;font-weight:700;font-size:14px;box-shadow:var(--sh);z-index:90;opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1}
.spk{background:none;border:1px solid var(--line);border-radius:50%;width:64px;height:64px;font-size:26px;display:grid;place-items:center;margin:8px auto}
.center{text-align:center}
.mt{margin-top:14px}.mb{margin-bottom:14px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.streakflame{filter:drop-shadow(0 0 6px #ff8f1f88)}

/* Examen */
.exbar{display:flex;align-items:center;justify-content:space-between;gap:10px;position:sticky;top:0;z-index:10;
  background:rgba(11,15,26,.92);backdrop-filter:blur(10px);padding:8px 2px;margin:-4px 0 8px}
.exbar .timer{font-variant-numeric:tabular-nums;font-weight:800;font-size:15px;background:var(--card);border:1px solid var(--line);
  border-radius:20px;padding:6px 12px;display:flex;align-items:center;gap:6px}
.exbar .sec{font-size:12px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}
.exbar .sec.L{color:var(--purple)} .exbar .sec.R{color:var(--blue)}
.passage{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:14px;
  font-size:13.5px;line-height:1.5;white-space:pre-line;max-height:230px;overflow-y:auto;color:var(--txt)}
.passage .pt{font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--accent);margin-bottom:8px;white-space:normal}
.seg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0}
.seg button{padding:12px 4px;border-radius:12px;border:1.5px solid var(--line);background:var(--card2);font-weight:800;font-size:14px}
.seg button small{display:block;font-size:10px;color:var(--muted);font-weight:600;margin-top:2px}
.seg button.on{border-color:var(--accent);background:#ffb02018;color:var(--accent)}
.donut{display:block;margin:4px auto}
.hist{display:flex;align-items:center;justify-content:space-between;padding:11px 12px;background:var(--card2);
  border:1px solid var(--line);border-radius:11px;margin-bottom:8px;font-size:14px}
.hist .d{color:var(--muted);font-size:12px}
.hist b{font-size:17px;font-weight:900}
.scoreline{display:flex;justify-content:space-around;margin:14px 0;text-align:center}
.scoreline .v{font-size:26px;font-weight:900}
.scoreline .k{font-size:12px;color:var(--muted)}
.review-item{background:var(--card2);border:1px solid var(--line);border-left:3px solid var(--bad);border-radius:0 11px 11px 0;padding:12px 14px;margin-bottom:10px;font-size:14px}
.review-item .qq{font-weight:700;margin-bottom:6px}
.review-item .ans{font-size:13px}
.review-item .ans .ok{color:var(--good);font-weight:700}
.review-item .ans .ko{color:var(--bad);font-weight:700;text-decoration:line-through}
.banner{background:linear-gradient(120deg,#ffb02022,#ff8f1f11);border:1px solid var(--accent);border-radius:var(--r);
  padding:16px;margin-bottom:14px}
.banner .t{font-weight:800;font-size:16px;color:var(--accent)}
.banner .d{font-size:13px;color:var(--txt);margin:4px 0 10px}

/* Traduire */
.transfr{font-size:22px;font-weight:700;line-height:1.4;margin:8px 0 14px}
.transfr.small{font-size:16px;color:var(--muted);font-weight:600;margin-bottom:12px}
.transinput{width:100%;background:var(--bg2);border:1.5px solid var(--line);border-radius:12px;color:var(--txt);
  font-family:inherit;font-size:16px;padding:12px 14px;margin-bottom:12px;resize:vertical;min-height:56px}
.transinput:focus{outline:none;border-color:var(--accent)}
.trans-mine{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:11px 14px;margin-bottom:12px;font-size:15px}
.trans-mine .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:800;margin-bottom:4px}
.trans-model{background:linear-gradient(160deg,var(--card2),var(--card));border:1px solid var(--good);border-radius:14px;padding:14px;margin-bottom:12px}
.trans-model .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--good);font-weight:800;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.trans-model .en{font-size:20px;font-weight:800;line-height:1.35}
.trans-alt{font-size:13px;color:var(--muted);margin-top:8px}
.spk.sm{width:30px;height:30px;font-size:15px;margin:0;border-radius:8px}
.segwrap{display:flex;flex-wrap:wrap;gap:8px}
.segchip{background:var(--card2);border:1.5px solid var(--line);border-radius:20px;padding:8px 12px;font-size:13px;font-weight:700;color:var(--txt)}
.segchip.on{border-color:var(--accent);background:#ffb02018;color:var(--accent)}
.segchip .cnt{color:var(--muted);font-weight:600;font-size:11px}
.segchip.on .cnt{color:var(--accent)}

/* Nav à 6 onglets : un peu plus compact */
.nav button{font-size:10px}
.nav button .ni{font-size:20px}

/* Objectif du jour */
.goal{display:flex;align-items:center;gap:8px;font-size:13.5px;padding:2px 0}
.goal .gk{font-size:14px}
.goal .gt{flex:1;color:var(--muted)}
.goal.ok .gt{color:var(--txt)}
.goal .gs{font-variant-numeric:tabular-nums;font-weight:800;color:var(--muted);font-size:12px}
.goal.ok .gs{color:var(--good)}

/* Transcription (écoute longue) */
.script{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:10px 14px;font-size:14px;line-height:1.5}
.script summary{cursor:pointer;font-weight:700;color:var(--accent);font-size:13px}

/* Dictionnaire */
.vrow{display:flex;align-items:center;gap:11px;background:var(--card2);border:1px solid var(--line);border-radius:11px;padding:9px 12px;margin-bottom:7px}
.vinfo{flex:1;min-width:0}
.vinfo .ven{font-weight:800;font-size:15px}
.vinfo .vfr{color:var(--muted);font-size:13px}
.vmeta{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.vst{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.03em}
.vst.st-new{color:var(--dim)} .vst.st-lrn{color:var(--accent)} .vst.st-mat{color:var(--good)}

/* Coach */
.card.coach{background:linear-gradient(135deg,#4d8dff18,var(--card));border-color:#4d8dff55}
.coach-h{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--blue)}
.coach-t{font-size:18px;font-weight:800;margin-top:2px}

/* Trophées */
.trophygrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.trophy{background:var(--card2);border:1px solid var(--line);border-radius:14px;padding:14px 12px;text-align:center;opacity:.55}
.trophy.got{opacity:1;border-color:var(--accent)}
.trophy .tic{font-size:30px;line-height:1}
.trophy .tt2{font-weight:800;font-size:14px;margin-top:6px}
.trophy .td{font-size:11.5px;color:var(--muted);margin-top:2px;line-height:1.35}
</style>
</head>
<body>
<div class="top">
  <div class="logo">CUMBRE<small>ESPAÑOL · A2 → C1 · DELE</small></div>
  <div class="stats">
    <div class="chip"><span class="streakflame">🔥</span><span id="streak">0</span></div>
    <div class="chip"><span class="k">Niv.</span><span id="hlevel">1</span></div>
  </div>
</div>

<div class="wrap" id="app"></div>

<div class="nav">
  <button data-v="home" class="on"><span class="ni">🏠</span>Accueil</button>
  <button data-v="grammar"><span class="ni">📘</span>Grammaire</button>
  <button data-v="anki"><span class="ni">🃏</span>Cartes</button>
  <button data-v="listen"><span class="ni">🎧</span>Écoute</button>
  <button data-v="traduire"><span class="ni">✍️</span>Traduire</button>
  <button data-v="exam"><span class="ni">🎯</span>Examen</button>
</div>

<div class="toast" id="toast"></div>

<script src="data.js?v=2"></script>
<script src="vocab-es.js?v=2"></script>
<script src="vocab-es2.js?v=2"></script>
<script src="vocab-es3.js?v=6"></script>
<script src="vocab-es4.js?v=1"></script>
<script src="translations.js?v=1"></script>
<script src="listening-long.js?v=2"></script>
<script src="exam-data.js?v=1"></script>
<script src="advanced-es.js?v=2"></script>
<script src="advanced-es2.js?v=5"></script>
<script src="advanced-es3.js?v=1"></script>
<script src="register.js?v=1"></script>
<script src="tenses.js?v=1"></script>
<script src="app.js?v=10"></script>
</body>
</html>
